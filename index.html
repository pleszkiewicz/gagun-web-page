<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="app.title">Gagun Web Page</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/apollonius-favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/mathjs@12/lib/browser/math.js"></script>
    <script src="locales/en.js" defer></script>
    <script src="pages/plotter-2d.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <button
        class="menu-toggle"
        id="menuToggle"
        type="button"
        aria-controls="siteNavigation"
        aria-expanded="false"
        data-i18n-aria-label="navigation.open"
        data-i18n-title="navigation.open"
      >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>

      <div class="nav-scrim" id="navScrim" hidden></div>

      <nav
        class="side-nav"
        id="siteNavigation"
        aria-label="Page navigation"
        aria-hidden="true"
      >
        <div class="side-nav-header">
          <div class="side-brand">
            <img
              class="brand-mark"
              src="assets/apollonius-menu.png"
              alt=""
              aria-hidden="true"
            >
            <div class="side-brand-text">
              <p class="eyebrow" data-i18n="app.eyebrow">Gagun Tools</p>
              <h1 data-i18n="navigation.title">Pages</h1>
            </div>
          </div>
          <button
            class="nav-close"
            id="navClose"
            type="button"
            data-i18n-aria-label="navigation.close"
            data-i18n-title="navigation.close"
          >
            &times;
          </button>
        </div>
        <div class="page-list" id="pageList"></div>
      </nav>

      <main class="page-viewport" id="pageViewport" tabindex="-1">
        <div class="page-host" id="pageHost"></div>
      </main>
    </div>
  </body>
</html>
