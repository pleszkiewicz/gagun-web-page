    <text x="44" y="168" font-size="15" transform="rotate(-4 44 168)">∇·D = ρfree</text>
    <text x="250" y="164" font-size="15" transform="rotate(-12 250 164)">β = (XᵀX)⁻¹Xᵀy</text>
    <text x="606" y="210" font-size="14" transform="rotate(18 606 210)">z = r e^{iθ}</text>
    <text x="130" y="242" font-size="15" transform="rotate(15 130 242)">curl grad φ = 0</text>
    <text x="594" y="268" font-size="14" transform="rotate(-11 594 268)">λ = lim 1/t log||δx(t)||</text>
    <text x="210" y="320" font-size="15" transform="rotate(-8 210 320)">Q(s,a) ← Q + α[r + γ max Q - Q]</text>
    <text x="52" y="412" font-size="15" transform="rotate(4 52 412)">Γᵏᵢⱼ = 1/2 gᵏℓ(∂ᵢgⱼℓ+∂ⱼgᵢℓ-∂ℓgᵢⱼ)</text>
    <text x="430" y="444" font-size="14" transform="rotate(14 430 444)">E[XXᵀ] = C, C vᵢ = λᵢvᵢ</text>
    <text x="560" y="366" font-size="14" transform="rotate(-18 560 366)">Noether: δS=0 ⇒ ∂μjμ=0</text>
