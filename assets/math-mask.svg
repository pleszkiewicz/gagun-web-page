  <g fill="#fff" font-family="Georgia, 'Times New Roman', serif" opacity=".6">
    <text x="30" y="50" font-size="22" transform="rotate(-6 30 50)">∮∂Ω ω = ∫Ω dω</text>
    <text x="220" y="62" font-size="20" transform="rotate(4 220 62)">∂tρ + ∇·(ρu) = 0</text>
    <text x="436" y="48" font-size="19" transform="rotate(-10 436 48)">D_KL(P || Q) = Σ p log(p/q)</text>
    <text x="34" y="118" font-size="18" transform="rotate(9 34 118)">ℒ = -1/4 FμνF^μν + ψ̄(iγμDμ-m)ψ</text>
    <text x="320" y="126" font-size="21" transform="rotate(-4 320 126)">∇×B = μ₀J + μ₀ε₀ ∂E/∂t</text>
    <text x="514" y="162" font-size="18" transform="rotate(13 514 162)">Hψ = iℏ ∂ψ/∂t</text>
    <text x="86" y="204" font-size="19" transform="rotate(-13 86 204)">∫ e^{-iωt} x(t) dt</text>
    <text x="286" y="204" font-size="17" transform="rotate(7 286 204)">χ² = (x-μ)^TΣ⁻¹(x-μ)</text>
    <text x="448" y="228" font-size="20" transform="rotate(-5 448 228)">∂u/∂t + u·∇u = -∇p + νΔu</text>
    <text x="44" y="282" font-size="21" transform="rotate(5 44 282)">Rμν - 1/2 Rgμν + Λgμν = 8πGTμν</text>
    <text x="324" y="304" font-size="18" transform="rotate(-15 324 304)">argminθ ||Aθ-b||² + λ||θ||₁</text>
    <text x="538" y="306" font-size="19" transform="rotate(10 538 306)">ẋ = σ(y-x)</text>
    <text x="32" y="356" font-size="18" transform="rotate(-5 32 356)">P(x|z) ∝ P(z|x)P(x)</text>
    <text x="214" y="380" font-size="20" transform="rotate(12 214 380)">det(J - λI) = 0</text>
    <text x="438" y="390" font-size="18" transform="rotate(-8 438 390)">∂S/∂t + H(q, ∂S/∂q, t) = 0</text>
    <text x="44" y="470" font-size="21" transform="rotate(11 44 470)">∇²φ = 4πGρ</text>
    <text x="260" y="492" font-size="18" transform="rotate(-4 260 492)">∫ exp(iS[x]/ℏ) 𝒟x</text>
    <text x="506" y="488" font-size="20" transform="rotate(7 506 488)">AᵀPA - P = -Q</text>
  </g>

  <g fill="#fff" font-family="'SFMono-Regular', Consolas, monospace" opacity=".42">
